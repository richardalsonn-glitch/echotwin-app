<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#071421" />
    <title>BendekiSen - Çevrimdışı</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #071421;
        color: #f7fbff;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(46, 232, 214, 0.18), transparent 34%),
          linear-gradient(160deg, #071421 0%, #050914 100%);
      }

      main {
        width: min(86vw, 360px);
        text-align: center;
        padding: 28px 22px;
        border: 1px solid rgba(46, 232, 214, 0.16);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.045);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38), 0 0 44px rgba(46, 232, 214, 0.12);
        backdrop-filter: blur(18px);
      }

      img {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        box-shadow: 0 0 34px rgba(46, 232, 214, 0.28);
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: rgba(247, 251, 255, 0.62);
        font-size: 14px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="BendekiSen" />
      <h1>Bağlantı yok</h1>
      <p>BendekiSen şu anda çevrimdışı. İnternet bağlantın geldiğinde deneyim kaldığı yerden devam eder.</p>
    </main>
  </body>
</html>
